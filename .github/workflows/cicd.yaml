name: CICD with argocd
on: 
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
     
      - name: Sonarqube scan
        run: |
         mvn sonar:sonar \
         -Dsonar.host.url=http://54.235.9.96:9000/ \
         -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Build maven
        run: mvn clean package

      - name: Setup Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username=${{ secrets.DOCKER_USERNAME }}
          password=${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: venkateshwarlur.myrepo:${{ github.run_number }}

      - name: Update Deployment manifest
        run: |
          echo "Updating image tag in deployment.yaml"
          sed -i "s/myrepo:.*myrepo:${{ github.run_number }}/g" deploymentfiles/deployment.yaml
          echo "Updated deployment.yml content:"
          cat deploymentfiles/deployment.yaml

      - name: Commit and push deployment file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update deployment image to version ${{ github.run_number }}"
          branch: main
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ArgoCD
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd /usr/local/bin/argocd

      - name: Trigger ArgoCD sync
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} -- insecure
          argocd app sync prodapp

          
          
        
      
      
